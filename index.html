<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium High-Speed Secure Download Center</title>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #0099ff;
            --bg: #070a12;
            --card-bg: rgba(19, 27, 44, 0.75);
            --text: #ffffff;
            --neon-glow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #101726 0%, var(--bg) 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary);
            filter: blur(150px);
            opacity: 0.2;
            top: 10%; left: 10%;
            z-index: 1;
        }
        .wrapper {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 2;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 255, 204, 0.1);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }
        .badge-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }
        .meta-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 25px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .rating { color: #ffb800; font-weight: bold; }
        .video-container {
            position: relative;
            width: 100%;
            height: 250px;
            border-radius: 20px;
            overflow: hidden;
            background: #000 url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=500&auto=format&fit=crop') center/cover;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease;
            border: 2px solid rgba(255,255,255,0.05);
        }
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(7, 10, 18, 0.2), rgba(7, 10, 18, 0.8));
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }
        .play-button svg {
            width: 30px;
            height: 30px;
            fill: #fff;
            margin-left: 5px;
        }
        .video-container:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }
        .video-container:hover .play-button {
            transform: scale(1.1);
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: var(--neon-glow);
        }
        .video-container:hover .play-button svg {
            fill: #070a12;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            background: linear-gradient(135deg, var(--secondary) 0%, #00f2fe 100%);
            color: #000;
            text-decoration: none;
            font-size: 16px;
            font-weight: 800;
            border-radius: 16px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 153, 255, 0.3);
            box-sizing: border-box;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 153, 255, 0.5);
            background: linear-gradient(135deg, #00f2fe 0%, var(--primary) 100%);
        }
        .security-badge {
            margin-top: 25px;
            font-size: 11px;
            color: #63758d;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .security-badge svg {
            width: 14px;
            height: 14px;
            fill: #00ffcc;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="wrapper">
    <div class="card">
        <span class="badge"><span class="badge-dot"></span>Ultra HD 4K Cloud Streaming</span>
        <h2 style="margin: 0 0 10px 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px;">Premium Link Generated</h2>
        
        <div class="meta-info">
            <div class="meta-item"><span class="rating">★ 4.98</span> (24.8K Streamers)</div>
            <div class="meta-item">•</div>
            <div class="meta-item">Size: 1.45 GB</div>
        </div>

        <!-- Fake Video Player Screen -->
        <div class="video-container" onclick="redirectToSmartLink()">
            <div class="video-overlay">
                <div class="play-button">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
            </div>
        </div>

        <!-- Premium Button -->
        <button class="btn" onclick="redirectToSmartLink()">Download from Secure Server</button>

        <!-- Security Trust Shield -->
        <div class="security-badge">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            SSL Secure 256-Bit Encrypted Connection
        </div>
    </div>
</div>

<script>
    const smartLink = "https://shorturl.at/1RW63";

    function redirectToSmartLink() {
        window.location.href = smartLink;
    }

    document.body.addEventListener('click', function(e) {
        if(e.target.tagName !== 'BUTTON' && !e.target.closest('.video-container')) {
            redirectToSmartLink();
        }
    });
</script>

</body>
</html>
